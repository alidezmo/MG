<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MG HOME ♥️</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2563eb; 
            --primary-dark: #1d4ed8;
            --bg-color: #f3f4f6; 
            --chat-bg: #ffffff;
            --text-color: #1f2937;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
            --hover-bg: #f9fafb;
            --msg-me-bg: #2563eb;
            --msg-me-text: #ffffff;
            --msg-other-bg: #f3f4f6;
            --msg-other-text: #1f2937;
            --input-bg: #f3f4f6;
        }

        body.dark-theme {
            --primary-color: #3b82f6;
            --primary-dark: #2563eb;
            --bg-color: #0f172a; 
            --chat-bg: #1e293b;  
            --text-color: #f8fafc; 
            --card-bg: #1e293b;    
            --border-color: #334155; 
            --hover-bg: #334155;
            --msg-me-bg: #3b82f6;
            --msg-me-text: #ffffff;
            --msg-other-bg: #334155; 
            --msg-other-text: #f8fafc;
            --input-bg: #0f172a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; transition: background-color 0.3s, border-color 0.3s; }
        body { background: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; color: var(--text-color); user-select: none; }

        #login-screen { background: var(--card-bg); padding: 40px 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); text-align: center; width: 90%; max-width: 400px; z-index: 100; border: 1px solid var(--border-color); }
        .login-input { width: 100%; padding: 16px; border: 2px solid var(--border-color); border-radius: 12px; font-size: 16px; outline: none; margin-bottom: 15px; background: var(--input-bg); color: var(--text-color); }
        .login-input:focus { border-color: var(--primary-color); }
        .login-btn { background: var(--primary-color); color: white; border: none; padding: 16px; font-size: 16px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 600; transition: 0.3s; }
        .login-btn:hover { background: var(--primary-dark); transform: translateY(-2px); }

        #app-container { display: none; width: 100%; height: 100dvh; background: var(--bg-color); max-width: 1400px; box-shadow: 0 0 40px rgba(0,0,0,0.1); position: relative;}
        #sidebar-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 40; backdrop-filter: blur(3px); }

        #sidebar { width: 350px; background: var(--card-bg); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; transition: right 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 50; }
        .sidebar-header { padding: 20px; background: var(--card-bg); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .header-actions { display: flex; gap: 15px; align-items: center; }
        .theme-toggle-btn { background: var(--input-bg); border: none; color: var(--text-color); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        .theme-toggle-btn:hover { background: var(--border-color); transform: rotate(15deg); }
        
        #sidebar-users { flex: 1; overflow-y: auto; padding: 10px; }
        .sidebar-section-title { font-size: 13px; color: var(--primary-color); font-weight: 800; margin: 15px 10px 5px; }

        .user-item { display: flex; align-items: center; gap: 15px; padding: 12px 15px; border-radius: 16px; cursor: pointer; transition: 0.2s; background: transparent; margin-bottom: 5px; border: 1px solid transparent;}
        .user-item:hover { background: var(--hover-bg); border-color: var(--border-color); }
        .user-item.active-chat { background: var(--input-bg); border-color: var(--primary-color); }
        .unread-badge { background-color: #ef4444; color: white; font-size: 12px; font-weight: bold; width: 22px; height: 22px; border-radius: 50%; display: none; align-items: center; justify-content: center; margin-right: auto; box-shadow: 0 2px 5px rgba(239,68,68,0.4); }

        .private-avatar { width: 45px; height: 45px; border-radius: 12px; background: linear-gradient(135deg, var(--primary-color), var(--primary-dark)); display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 18px; }

        /* تنسيقات حالة الاتصال */
        .status-online { color: #10b981; font-size: 12px; font-weight: 600; }
        .status-offline { color: #9ca3af; font-size: 12px; font-weight: 600; }
        .avatar-offline { filter: grayscale(100%); opacity: 0.6; }

        .sidebar-footer { padding: 15px 20px; background: var(--card-bg); border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; }
        .my-profile { display: flex; align-items: center; gap: 10px; font-weight: bold; width: 100%; justify-content: space-between; }
        .logout-btn { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: bold; font-size: 12px;}
        .logout-btn:hover { background: #ef4444; color: white; }
        
        .install-btn { background: var(--primary-color); color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; display: none; transition: 0.2s; }
        .install-btn:hover { background: var(--primary-dark); }

        /* ================= تصميم فقاعة الإشعارات الداخلية ================= */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 99999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast-bubble { background: var(--card-bg); border: 1px solid var(--primary-color); box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-radius: 50px; padding: 8px 15px 8px 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; pointer-events: auto; animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: var(--text-color); min-width: 250px; max-width: 90vw; }
        .toast-bubble:hover { transform: scale(1.02); }
        @keyframes slideDown { 0% { top: -50px; opacity: 0; transform: scale(0.8); } 100% { top: 0; opacity: 1; transform: scale(1); } }
        @keyframes fadeOutUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-20px); } }

        /* منطقة الشات */
        #chat-screen { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--chat-bg); width: 100%; overflow: hidden;}
        .chat-header { background: var(--card-bg); padding: 12px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border-color); z-index: 10; }
        .mobile-menu-btn { display: none; background: none; border: none; font-size: 24px; color: var(--text-color); cursor: pointer; }
        .header-title { font-size: 16px; font-weight: bold; color: var(--text-color); }
        .typing-indicator { color: var(--primary-color); font-weight: bold; font-size: 12px; animation: pulseTyping 1.5s infinite; }
        @keyframes pulseTyping { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        
        #clear-chat-btn { background: none; border: none; color: #ef4444; font-size: 18px; cursor: pointer; padding: 8px; border-radius: 50%; transition: 0.2s; display: flex; align-items: center; justify-content: center; opacity: 0.7;}
        #clear-chat-btn:hover { background: rgba(239, 68, 68, 0.1); opacity: 1; transform: scale(1.1);}

        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; z-index: 1; background-image: radial-gradient(var(--border-color) 1px, transparent 1px); background-size: 20px 20px; }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 10px; }
        
        .msg-bubble { 
            position: relative; max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-wrap: break-word; animation: fadeIn 0.3s ease; width: fit-content; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: transform 0.2s ease-out; z-index: 1; margin-bottom: 5px; 
            /* منع التحديد الخاطئ للنص لتسهيل الضغط المطول */
            user-select: none; 
            -webkit-user-select: none;
        }
        
        .msg-me { background-color: var(--msg-me-bg); color: var(--msg-me-text); align-self: flex-start; border-top-right-radius: 4px; padding-right: 35px !important; padding-left: 15px !important; }
        .msg-other { background-color: var(--msg-other-bg); color: var(--msg-other-text); align-self: flex-end; border-top-left-radius: 4px; border: 1px solid var(--border-color); padding-left: 35px !important; padding-right: 15px !important; }
        
        .sender-name { font-size: 12px; font-weight: 800; color: var(--primary-color); margin-bottom: 5px; display: block; }
        .msg-me .sender-name { color: #dbeafe; }
        .dark-theme .msg-other .sender-name { color: #60a5fa; }

        /* ================= تنسيق الروابط ويوتيوب ================= */
        .msg-bubble a { color: var(--primary-color); text-decoration: underline; font-weight: bold;}
        .msg-me a { color: #dbeafe; }
        .dark-theme .msg-other a { color: #60a5fa; }
        
        .yt-preview { margin-top: 10px; border-radius: 12px; overflow: hidden; position: relative; max-width: 320px; border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.1);}
        .yt-preview a { display: block; position: relative; }
        .yt-preview img { width: 100%; display: block; transition: 0.3s; }
        .yt-play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; color: #ff0000; background: rgba(255,255,255,0.9); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.2s;}
        .yt-preview a:hover img { transform: scale(1.05); }
        .yt-preview a:hover .yt-play-icon { transform: translate(-50%, -50%) scale(1.1); background: white; }

        .msg-options { position: absolute; top: 8px; width: 26px; height: 26px; display: flex; justify-content: center; align-items: center; cursor: pointer; border-radius: 50%; transition: 0.2s; z-index: 10; opacity: 0.3; }
        .msg-me .msg-options { right: 5px; left: auto; color: white; }
        .msg-other .msg-options { left: 5px; right: auto; color: var(--text-color); }
        .msg-bubble:hover .msg-options { opacity: 1; background: rgba(0,0,0,0.1); }
        .dark-theme .msg-bubble:hover .msg-options { background: rgba(255,255,255,0.1); }

        .msg-menu { display: none; position: absolute; top: 30px; background: var(--card-bg); box-shadow: 0 8px 25px rgba(0,0,0,0.2); border-radius: 12px; overflow: hidden; z-index: 100; min-width: 140px; width: max-content; border: 1px solid var(--border-color); }
        .msg-me .msg-menu { right: 0; left: auto; }
        .msg-other .msg-menu { left: 0; right: auto; }
        .msg-menu.show { display: flex; flex-direction: column; }
        .msg-menu button { background: none; border: none; padding: 12px 15px; text-align: right; cursor: pointer; font-size: 13px; color: var(--text-color); transition: 0.2s; display: flex; align-items: center; gap: 10px; font-weight: 600;}
        .msg-menu button:hover { background: var(--hover-bg); color: var(--primary-color); }
        .msg-menu .delete-btn:hover { color: #ef4444; background: rgba(239, 68, 68, 0.05); }

        .reaction-menu { display: none; position: absolute; top: -45px; left: 50%; transform: translateX(-50%); background: var(--card-bg); box-shadow: 0 5px 15px rgba(0,0,0,0.2); border-radius: 25px; padding: 5px 10px; z-index: 100; border: 1px solid var(--border-color); gap: 8px; animation: popUp 0.2s ease-out; }
        @keyframes popUp { 0% { opacity: 0; transform: translate(-50%, 10px); } 100% { opacity: 1; transform: translate(-50%, 0); } }
        .reaction-menu.show { display: flex; }
        .reaction-emoji { cursor: pointer; font-size: 20px; transition: 0.2s; }
        .reaction-emoji:hover { transform: scale(1.4) translateY(-5px); }

        .reactions-display { position: absolute; bottom: -12px; display: flex; gap: 2px; background: var(--card-bg); padding: 2px 6px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.15); border: 1px solid var(--border-color); font-size: 14px; z-index: 5; }
        .msg-me .reactions-display { left: 10px; }
        .msg-other .reactions-display { right: 10px; }
        .reactions-display.hidden { display: none; }

        .quoted-msg { background: rgba(0,0,0,0.1); border-right: 3px solid var(--primary-dark); padding: 6px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 13px; cursor: pointer; }
        .dark-theme .msg-other .quoted-msg { background: rgba(255,255,255,0.05); border-right-color: var(--primary-color); }
        .msg-me .quoted-msg { background: rgba(255,255,255,0.2); border-right-color: #ffffff; }
        
        .msg-meta { font-size: 10px; opacity: 0.8; text-align: left; margin-top: 5px; display: flex; justify-content: flex-end; align-items: center; gap: 5px; }
        .msg-me .msg-meta { justify-content: flex-start; }
        .status-read { color: #60a5fa; text-shadow: 0 0 2px rgba(255,255,255,0.3); } 

        #reply-preview-box { display: none; background: var(--card-bg); border-right: 4px solid var(--primary-color); padding: 10px 15px; position: relative; border-top: 1px solid var(--border-color); z-index: 5;}
        .reply-close-btn { position: absolute; left: 15px; top: 15px; color: var(--text-color); opacity: 0.5; cursor: pointer; font-size: 18px; }

        .chat-input-area { background-color: var(--card-bg); padding: 10px 15px; display: flex; gap: 10px; align-items: flex-end; z-index: 5; border-top: 1px solid var(--border-color);}
        .input-wrapper { flex: 1; display: flex; align-items: flex-end; background: var(--input-bg); border-radius: 24px; padding: 5px 10px; transition: 0.3s; min-height: 45px; border: 1px solid transparent; }
        .input-wrapper:focus-within { border-color: var(--primary-color); background: var(--card-bg); }
        .chat-input { flex: 1; padding: 10px 5px; border: none; background: transparent; outline: none; font-size: 15px; color: var(--text-color); resize: none; max-height: 100px; overflow-y: auto; }
        
        .icon-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: #9ca3af; padding: 10px; border-radius: 50%; transition: 0.2s; display: flex; justify-content: center; align-items: center;}
        .icon-btn:hover { color: var(--primary-color); }
        .send-btn { background-color: var(--primary-color); color: white; border: none; width: 48px; height: 48px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; transform: rotate(180deg); transition: 0.2s; flex-shrink: 0; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);}
        .send-btn:active { transform: rotate(180deg) scale(0.9); }
        
        #recording-ui { display: none; flex: 1; align-items: center; justify-content: space-between; background: rgba(239, 68, 68, 0.1); border-radius: 24px; padding: 5px 15px; height: 45px; border: 1px solid rgba(239, 68, 68, 0.3); }
        .record-indicator { color: #ef4444; animation: blink 1s infinite; font-weight: bold; font-size: 14px;}
        input[type="file"] { display: none; }
        
        .custom-audio-player { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.08); padding: 6px 12px; border-radius: 30px; margin-top: 5px; width: 240px; max-width: 100%; border: 1px solid rgba(0,0,0,0.05);}
        .dark-theme .msg-other .custom-audio-player { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1);}
        .msg-me .custom-audio-player { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.3);}
        .play-btn { width: 34px; height: 34px; border-radius: 50%; border: none; background: var(--primary-color); color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 14px; transition: 0.2s; flex-shrink: 0;}
        .msg-me .play-btn { background: white; color: var(--primary-color); }
        .play-btn:active { transform: scale(0.9); }
        .audio-progress { flex: 1; height: 6px; background: rgba(0,0,0,0.1); border-radius: 5px; position: relative; overflow: hidden; cursor: pointer;}
        .msg-me .audio-progress { background: rgba(255,255,255,0.3); }
        .progress-bar { height: 100%; width: 0%; background: var(--primary-color); border-radius: 5px; transition: width 0.1s linear; }
        .msg-me .progress-bar { background: white; }
        .audio-time { font-size: 12px; font-weight: bold; min-width: 35px; text-align: center; color: inherit; }

        .file-attachment { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.05); padding: 12px; border-radius: 12px; margin-top: 5px; text-decoration: none; color: inherit; border: 1px solid rgba(0,0,0,0.1); }
        .dark-theme .msg-other .file-attachment { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
        .file-attachment i { font-size: 24px; color: var(--primary-color); }
        .msg-me .file-attachment i { color: white; }
        
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(5px); }
        .lightbox-close-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; cursor: pointer; z-index: 10000; transition: 0.2s;}
        .lightbox-close-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }
        .lightbox-img-container { width: 100%; height: 80%; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #lightbox-img { max-width: 95%; max-height: 95%; transition: transform 0.1s ease-out; cursor: grab; position: absolute; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);}
        .lightbox-controls { display: flex; gap: 20px; margin-top: 20px; background: rgba(0,0,0,0.5); padding: 10px 25px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .zoom-btn { background: none; color: white; border: none; font-size: 22px; cursor: pointer; padding: 10px; transition: 0.2s; }
        .zoom-btn:hover { color: var(--primary-color); transform: scale(1.2);}
        .image-preview { max-width: 100%; border-radius: 12px; margin-top: 5px; cursor: zoom-in; border: 2px solid var(--border-color); }

        @media (max-width: 768px) {
            #sidebar { position: absolute; right: -100%; height: 100%; width: 85%; max-width: 350px; }
            #sidebar.open { right: 0; }
            #sidebar-overlay.active { display: block; }
            .mobile-menu-btn { display: block; }
            .msg-bubble { max-width: 85%; }
        }
    </style>
</head>
<body>

    <audio id="notification-sound" src="https://proxy.notificationsounds.com/message-tones/pristine-609/download/file-sounds-1140-pristine.mp3" preload="auto"></audio>

    <div id="lightbox">
        <button class="lightbox-close-btn" onclick="closeLightbox()"><i class="fa-solid fa-xmark"></i></button>
        <div class="lightbox-img-container"><img id="lightbox-img" src="" draggable="false"></div>
        <div class="lightbox-controls">
            <button class="zoom-btn" onclick="zoomImage(0.5)"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
            <button class="zoom-btn" onclick="resetZoom()"><i class="fa-solid fa-expand"></i></button>
            <button class="zoom-btn" onclick="zoomImage(-0.5)"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
        </div>
    </div>

    <div id="login-screen">
        <h2 style="color:var(--primary-color); margin-bottom:10px;">أهلاً بك 💬</h2>
        <p style="color:#6b7280; margin-bottom: 20px;">الرجاء كتابة اسمك للمتابعة</p>
        <input type="text" id="username-input" class="login-input" placeholder="اسمك الكريم...">
        <input type="password" id="passcode-input" class="login-input" placeholder="رمز الدخول السري (2026)...">
        <button id="start-btn" class="login-btn">دخول للدردشة</button>
    </div>

    <div id="toast-container"></div>

    <div id="app-container">
        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

        <div id="sidebar">
            <div class="sidebar-header">
                <div class="private-avatar" id="my-avatar">U</div>
                <div class="header-actions">
                    <button class="theme-toggle-btn" id="theme-btn" onclick="toggleTheme()" title="الوضع الليلي"><i class="fa-solid fa-moon"></i></button>
                </div>
            </div>
            
            <div id="sidebar-users">
                <div class="sidebar-section-title">الغرف المشتركة</div>
                <div class="user-item active-chat" id="chat-btn-global" onclick="switchChat('global', 'المجموعة العامة')">
                    <div class="private-avatar"><i class="fa-solid fa-earth-americas"></i></div>
                    <div style="flex:1;">
                        <strong style="display:block; font-size:15px; color:var(--text-color);">المجموعة العامة</strong>
                    </div>
                    <div class="unread-badge" id="badge-global">0</div>
                </div>
                <div class="section-divider"></div>
                <div class="sidebar-section-title">الأصدقاء (رسائل خاصة)</div>
                <div id="online-users-list"></div>
            </div>

            <div class="sidebar-footer">
                <button id="install-app-btn" class="install-btn"><i class="fa-solid fa-download"></i> تثبيت التطبيق</button>
                <div class="my-profile">
                    <span id="my-name-display" style="color:var(--text-color);">الاسم</span>
                    <button class="logout-btn" onclick="logoutApp()"><i class="fa-solid fa-arrow-right-from-bracket"></i> خروج</button>
                </div>
            </div>
        </div>

        <div id="chat-screen">
            <div class="chat-header">
                <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars-staggered"></i></button>
                <div class="private-avatar" id="header-icon"><i class="fa-solid fa-earth-americas"></i></div>
                <div style="flex:1;">
                    <div class="header-title" id="chat-title">المجموعة العامة</div>
                    <div style="font-size: 12px; color: var(--primary-color); font-weight:bold;" id="chat-subtitle">مشفر بالكامل</div>
                </div>
                <button id="clear-chat-btn" title="مسح المحادثة بالكامل"><i class="fa-solid fa-trash-can"></i></button>
            </div>

            <div class="chat-messages" id="chat-messages"></div>

            <div id="reply-preview-box">
                <i class="fa-solid fa-xmark reply-close-btn" onclick="cancelReply()"></i>
                <div style="font-size:13px; color:var(--primary-color); font-weight:bold; margin-bottom:2px;" id="reply-preview-name">الرد على:</div>
                <div style="font-size:14px; color:var(--text-color); opacity:0.8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" id="reply-preview-text">...</div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper" id="normal-input-ui">
                    <button class="icon-btn" id="attach-btn" title="إرفاق ملف"><i class="fa-solid fa-paperclip"></i></button>
                    <input type="file" id="file-input">
                    <textarea id="msg-input" class="chat-input" placeholder="اكتب رسالة..." rows="1"></textarea>
                    <button class="icon-btn" id="mic-btn" title="تسجيل صوتي"><i class="fa-solid fa-microphone"></i></button>
                </div>

                <div id="recording-ui">
                    <button class="icon-btn" id="cancel-record-btn" style="color:#ef4444;" title="إلغاء"><i class="fa-solid fa-trash"></i></button>
                    <span class="record-indicator">🔴 تسجيل <span id="record-timer" style="color:var(--text-color);">00:00</span></span>
                    <button class="icon-btn" id="send-record-btn" style="color:#10b981;" title="إرسال"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
                <button class="send-btn" id="send-btn" title="إرسال"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        // إعداد Service Worker
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(()=>{}); }
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('install-app-btn').style.display = 'block'; 
        });
        document.getElementById('install-app-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') { document.getElementById('install-app-btn').style.display = 'none'; }
                deferredPrompt = null;
            }
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, update, remove, onDisconnect, off, query, limitToLast, onChildAdded, onChildRemoved, onChildChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyC7-tcbiTsWceNDICdiFOYw5xX8060-lEk",
          authDomain: "home-massage-7baaa.firebaseapp.com",
          databaseURL: "https://home-massage-7baaa-default-rtdb.firebaseio.com",
          projectId: "home-massage-7baaa",
          storageBucket: "home-massage-7baaa.firebasestorage.app",
          messagingSenderId: "797052107356",
          appId: "1:797052107356:web:31df814476617ad23ac499"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const SECRET_ROOM_CODE = "2026"; 

        // ================= الوضع الليلي وإغلاق القوائم =================
        const themeBtn = document.getElementById('theme-btn');
        let isDarkMode = localStorage.getItem('chat_theme') === 'dark';
        function applyTheme() {
            if(isDarkMode) { document.body.classList.add('dark-theme'); themeBtn.innerHTML = '<i class="fa-solid fa-sun" style="color:#fbbf24;"></i>'; } 
            else { document.body.classList.remove('dark-theme'); themeBtn.innerHTML = '<i class="fa-solid fa-moon"></i>'; }
        }
        applyTheme();
        window.toggleTheme = function() { isDarkMode = !isDarkMode; localStorage.setItem('chat_theme', isDarkMode ? 'dark' : 'light'); applyTheme(); }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.msg-bubble')) {
                document.querySelectorAll('.msg-menu.show').forEach(m => m.classList.remove('show'));
                document.querySelectorAll('.reaction-menu.show').forEach(m => m.classList.remove('show'));
                document.querySelectorAll('.msg-bubble').forEach(b => b.style.zIndex = '1');
            }
        });

        // ================= عارض الصور =================
        let currentImageScale = 1; let isDragging = false, startX, startY, transX = 0, transY = 0;
        const lightbox = document.getElementById('lightbox'), lightboxImg = document.getElementById('lightbox-img');
        window.openLightbox = function(src) { lightbox.style.display = 'flex'; lightboxImg.src = src; window.resetZoom(); }
        window.closeLightbox = function() { lightbox.style.display = 'none'; lightboxImg.src = ''; }
        function applyTransform() { lightboxImg.style.transform = `translate(${transX}px, ${transY}px) scale(${currentImageScale})`; }
        window.zoomImage = function(step) { currentImageScale += step; if(currentImageScale < 0.5) currentImageScale = 0.5; if(currentImageScale > 5) currentImageScale = 5; applyTransform(); }
        window.resetZoom = function() { currentImageScale = 1; transX = 0; transY = 0; applyTransform(); }
        lightboxImg.addEventListener('mousedown', e => { isDragging = true; startX = e.clientX - transX; startY = e.clientY - transY; });
        window.addEventListener('mouseup', () => { isDragging = false; });
        window.addEventListener('mousemove', e => { if(!isDragging) return; e.preventDefault(); transX = e.clientX - startX; transY = e.clientY - startY; applyTransform(); });
        lightboxImg.addEventListener('touchstart', e => { if(e.touches.length === 1) { isDragging = true; startX = e.touches[0].clientX - transX; startY = e.touches[0].clientY - transY; } });
        window.addEventListener('touchend', () => { isDragging = false; });
        window.addEventListener('touchmove', e => { if(!isDragging || e.touches.length !== 1) return; e.preventDefault(); transX = e.touches[0].clientX - startX; transY = e.touches[0].clientY - startY; applyTransform(); }, {passive: false});

        // ================= التهيئة وتسجيل الدخول =================
        let myName = localStorage.getItem('chat_username') || ''; 
        let myUserId = localStorage.getItem('chat_userid') || '';
        let currentChatMode = 'global', currentChatTargetId = null; 
        let currentMessagesRefPath = ''; 
        let currentListeners = [], typingListener = null, replyingToMsg = null;
        window.pendingUnreadMessages = [];

        const loginScreen = document.getElementById('login-screen'), appContainer = document.getElementById('app-container');
        const chatMessages = document.getElementById('chat-messages'), msgInput = document.getElementById('msg-input');
        const usersListEl = document.getElementById('online-users-list');

        window.toggleSidebar = function() { 
            document.getElementById('sidebar').classList.toggle('open'); 
            document.getElementById('sidebar-overlay').classList.toggle('active');
        }
        window.logoutApp = function() { localStorage.removeItem('chat_username'); localStorage.removeItem('chat_passcode'); localStorage.removeItem('chat_userid'); location.reload(); }

        function generateUserIdFromName(name) { return 'user_' + name.trim().replace(/\s+/g, '_').toLowerCase(); }

        const savedCode = localStorage.getItem('chat_passcode');
        setTimeout(() => {
            if (myName && savedCode === SECRET_ROOM_CODE && myUserId) { startApp(); }
        }, 0);

        document.getElementById('start-btn').addEventListener('click', () => {
            const name = document.getElementById('username-input').value.trim(), code = document.getElementById('passcode-input').value.trim();
            if (!name || code !== SECRET_ROOM_CODE) return alert("البيانات غير صحيحة!");
            myName = name; myUserId = generateUserIdFromName(name);
            localStorage.setItem('chat_username', myName); localStorage.setItem('chat_passcode', code); localStorage.setItem('chat_userid', myUserId);
            if (Notification.permission !== "granted") Notification.requestPermission();
            document.getElementById('notification-sound').load(); startApp();
        });

        const appStartTime = Date.now(); let unreadCounts = { global: 0 }; let trackedRooms = new Set(); 
        function playNotificationSound() { document.getElementById('notification-sound').play().catch(()=>{}); }

        // دالة عرض إشعار النظام المدمج (In-App Toast)
        function showInAppToast(name, text, roomType, targetId) {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toast = document.createElement('div'); toast.className = 'toast-bubble';
            const firstChar = name.charAt(0).toUpperCase();
            const avatarBg = roomType === 'global' ? 'var(--primary-color)' : '#10b981';
            
            toast.innerHTML = `
                <div class="private-avatar" style="width:38px; height:38px; font-size:16px; background:${avatarBg}; flex-shrink:0;">${firstChar}</div>
                <div style="flex:1; overflow:hidden;">
                    <strong style="display:block; font-size:13px; color:var(--primary-color);">${roomType === 'global' ? 'المجموعة العامة - ' + name : name}</strong>
                    <span style="font-size:12px; opacity:0.8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block;">${text}</span>
                </div>
            `;
            
            toast.onclick = () => {
                if (targetId !== 'system') {
                    const chatTitle = roomType === 'global' ? 'المجموعة العامة' : name;
                    switchChat(roomType, chatTitle, targetId);
                }
                toast.style.animation = 'fadeOutUp 0.3s forwards';
                setTimeout(() => toast.remove(), 300);
            };
            container.appendChild(toast);
            setTimeout(() => { if(toast.parentElement) { toast.style.animation = 'fadeOutUp 0.3s forwards'; setTimeout(() => toast.remove(), 300); } }, 4000);
        }

        // دالة نسخ نص الرسالة الجديدة
        window.copyMsgText = function(text) {
            navigator.clipboard.writeText(text).then(() => {
                showInAppToast('النظام', 'تم نسخ النص بنجاح ✔️', 'global', 'system');
            }).catch(err => console.error('فشل النسخ:', err));
        };

        function handleIncomingNotification(msg, roomType, targetId) {
            if (msg.timestamp < appStartTime || msg.name === myName) return; 

            if (!(currentChatMode === roomType && currentChatTargetId === targetId)) {
                const badgeId = roomType === 'global' ? 'global' : targetId;
                unreadCounts[badgeId] = (unreadCounts[badgeId] || 0) + 1;
                const badgeEl = document.getElementById('badge-' + badgeId);
                if (badgeEl) { badgeEl.innerText = unreadCounts[badgeId]; badgeEl.style.display = 'flex'; }
                
                playNotificationSound();
                let notifBody = msg.type === 'text' ? msg.content : (msg.type === 'audio' ? '🎤 أرسل رسالة صوتية' : '📁 أرسل ملفاً/صورة');

                if ('setAppBadge' in navigator) {
                    let totalUnread = Object.values(unreadCounts).reduce((a, b) => a + b, 0);
                    navigator.setAppBadge(totalUnread).catch(()=>{});
                }

                if (document.hidden && Notification.permission === "granted") {
                    let notifTitle = roomType === 'global' ? `المجموعة العامة - ${msg.name}` : `رسالة من ${msg.name}`;
                    const notification = new Notification(notifTitle, { body: notifBody, icon: './icon.svg' });
                    notification.onclick = function() { window.focus(); this.close(); };
                } else if (!document.hidden) {
                    showInAppToast(msg.name, notifBody, roomType, targetId);
                }
            }
        }

        function listenForNotifications(roomRefPath, roomType, targetId) {
            if (trackedRooms.has(roomRefPath)) return; trackedRooms.add(roomRefPath);
            onChildAdded(query(ref(db, roomRefPath), limitToLast(1)), snapshot => handleIncomingNotification(snapshot.val(), roomType, targetId));
        }

        function startApp() {
            loginScreen.style.display = 'none'; appContainer.style.display = 'flex';
            document.getElementById('my-name-display').innerText = myName;
            document.getElementById('my-avatar').innerText = myName.charAt(0).toUpperCase();
            registerInFirebase(); listenForNotifications('messages_global', 'global', 'global');
            switchChat('global', 'المجموعة العامة');
        }

        function timeAgo(timestamp) {
            if (!timestamp) return 'غير متصل';
            const seconds = Math.floor((Date.now() - timestamp) / 1000);
            if (seconds < 60) return 'منذ لحظات';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `آخر ظهور منذ ${minutes} دقيقة`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `آخر ظهور منذ ${hours} ساعة`;
            const days = Math.floor(hours / 24);
            return `آخر ظهور منذ ${days} يوم`;
        }

        function registerInFirebase() {
            const myUserRef = ref(db, 'users/' + myUserId);
            const connectedRef = ref(db, '.info/connected');

            onValue(connectedRef, snap => { 
                if (snap.val() === true) { 
                    update(myUserRef, { name: myName, userId: myUserId, online: true, lastSeen: Date.now() }); 
                    onDisconnect(myUserRef).update({ online: false, lastSeen: Date.now() }); 
                } 
            });

            onValue(ref(db, 'users'), snapshot => {
                const allUsers = snapshot.val() || {}; 
                usersListEl.innerHTML = ''; 
                
                const usersArray = Object.values(allUsers).filter(u => u.userId !== myUserId);
                usersArray.sort((a, b) => (b.online === a.online) ? 0 : b.online ? 1 : -1);

                usersArray.forEach(u => {
                    const roomID = myUserId < u.userId ? `${myUserId}_${u.userId}` : `${u.userId}_${myUserId}`;
                    listenForNotifications(`messages_private/${roomID}`, 'private', u.userId);
                    
                    const firstChar = u.name.charAt(0).toUpperCase();
                    const isActiveChat = currentChatTargetId === u.userId ? 'active-chat' : '';
                    const statusClass = u.online ? 'status-online' : 'status-offline';
                    const statusText = u.online ? 'متصل الآن' : timeAgo(u.lastSeen); 
                    const avatarClass = u.online ? '' : 'avatar-offline';
                    const avatarColor = u.online ? '#10b981' : '#6b7280';

                    const div = document.createElement('div'); 
                    div.className = `user-item ${isActiveChat}`; 
                    div.id = `chat-btn-${u.userId}`;
                    
                    div.innerHTML = `
                        <div class="private-avatar ${avatarClass}" style="background:${avatarColor};">${firstChar}</div>
                        <div style="flex:1;">
                            <strong style="display:block; color:var(--text-color); font-size:15px;">${u.name}</strong>
                            <small class="${statusClass}">${statusText}</small>
                        </div>
                        <div class="unread-badge" id="badge-${u.userId}">0</div>
                    `;
                    
                    div.onclick = () => { switchChat('private', u.name, u.userId); if(window.innerWidth <= 768) toggleSidebar(); };
                    usersListEl.appendChild(div);
                    
                    if(unreadCounts[u.userId] > 0) { 
                        document.getElementById('badge-' + u.userId).innerText = unreadCounts[u.userId]; 
                        document.getElementById('badge-' + u.userId).style.display = 'flex'; 
                    }
                });
            });
        }

        // ================= التبديل والمراقبة ومسح المحادثة =================
        window.switchChat = function(mode, title, targetId = null) {
            currentChatMode = mode; currentChatTargetId = targetId; window.cancelReply();
            
            const badgeId = mode === 'global' ? 'global' : targetId;
            unreadCounts[badgeId] = 0; if (document.getElementById(`badge-${badgeId}`)) document.getElementById(`badge-${badgeId}`).style.display = 'none';

            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active-chat'));
            const activeBtn = mode === 'global' ? document.getElementById('chat-btn-global') : document.getElementById(`chat-btn-${targetId}`);
            if(activeBtn) activeBtn.classList.add('active-chat');

            document.getElementById('chat-title').innerText = title;
            document.getElementById('header-icon').innerHTML = mode === 'global' ? '<i class="fa-solid fa-earth-americas"></i>' : title.charAt(0).toUpperCase();
            document.getElementById('header-icon').style.background = mode === 'global' ? 'var(--primary-color)' : '#10b981';

            currentListeners.forEach(unsub => unsub()); currentListeners = [];
            if(typingListener) { typingListener(); typingListener = null; }
            chatMessages.innerHTML = ''; 
            
            const roomID = mode === 'global' ? 'global' : (myUserId < targetId ? `${myUserId}_${targetId}` : `${targetId}_${myUserId}`);
            currentMessagesRefPath = mode === 'global' ? 'messages_global' : `messages_private/${roomID}`;
            const refQuery = query(ref(db, currentMessagesRefPath), limitToLast(100));

            currentListeners.push(onChildAdded(refQuery, (snapshot) => {
                const msg = snapshot.val(); 
                renderMsg(snapshot.key, msg, msg.name === myName);
                
                if (msg.name !== myName && currentChatMode === 'private' && (!msg.readBy || !msg.readBy[myUserId])) {
                    if (!document.hidden) {
                        update(ref(db, `${currentMessagesRefPath}/${snapshot.key}`), { [`readBy/${myUserId}`]: true });
                    } else {
                        window.pendingUnreadMessages.push(`${currentMessagesRefPath}/${snapshot.key}`);
                    }
                }
            }));
            
            currentListeners.push(onChildChanged(refQuery, (snapshot) => {
                const msg = snapshot.val(); 
                const statusIcon = document.getElementById('status-' + snapshot.key);
                if (statusIcon && msg.readBy) statusIcon.className = "fa-solid fa-check-double status-read";
                updateReactionsUI(snapshot.key, msg.reactions);
            }));
            
            currentListeners.push(onChildRemoved(refQuery, (snapshot) => {
                const el = document.getElementById('msg-' + snapshot.key);
                if(el) { el.style.animation = 'fadeIn 0.3s ease reverse'; setTimeout(() => el.remove(), 250); }
            }));

            typingListener = onValue(ref(db, `typing/${roomID}`), snapshot => {
                let anyoneTyping = false, typingName = '';
                snapshot.forEach(child => { if(child.key !== myUserId && child.val().isTyping) { anyoneTyping = true; typingName = child.val().name; } });
                document.getElementById('chat-subtitle').innerHTML = anyoneTyping ? `<span class="typing-indicator">${typingName} يكتب...</span>` : 'مشفر بالكامل';
            });
        };

        // مسح المحادثة بالكامل
        document.getElementById('clear-chat-btn').addEventListener('click', () => {
            if (!currentMessagesRefPath) return;
            const confirmMsg = currentChatMode === 'global' 
                ? "هل أنت متأكد أنك تريد مسح جميع رسائل 'المجموعة العامة' للجميع؟" 
                : `هل أنت متأكد من مسح المحادثة مع ${document.getElementById('chat-title').innerText}؟`;

            if (confirm(confirmMsg)) {
                remove(ref(db, currentMessagesRefPath)).then(() => alert("تم مسح المحادثة بنجاح!")).catch((error) => { console.error(error); alert("حدث خطأ أثناء المسح."); });
            }
        });

        window.addEventListener('focus', () => {
            if (window.pendingUnreadMessages && window.pendingUnreadMessages.length > 0) {
                window.pendingUnreadMessages.forEach(fullPath => { update(ref(db, fullPath), { [`readBy/${myUserId}`]: true }); });
                window.pendingUnreadMessages = []; 
                if (currentChatMode === 'private' && currentChatTargetId) {
                    unreadCounts[currentChatTargetId] = 0;
                    const badgeEl = document.getElementById('badge-' + currentChatTargetId);
                    if (badgeEl) badgeEl.style.display = 'none';
                }
            }
            if ('clearAppBadge' in navigator) { navigator.clearAppBadge().catch(()=>{}); }
        });

        // ================= التفاعلات والرسائل والروابط =================
        window.toggleMsgMenu = function(key) {
            const menu = document.getElementById('menu-' + key);
            const bubble = document.getElementById('msg-' + key);
            const isShowing = menu.classList.contains('show');
            document.querySelectorAll('.msg-menu.show').forEach(m => m.classList.remove('show'));
            document.querySelectorAll('.reaction-menu.show').forEach(m => m.classList.remove('show'));
            document.querySelectorAll('.msg-bubble').forEach(b => b.style.zIndex = '1');
            if (!isShowing) { menu.classList.add('show'); if(bubble) bubble.style.zIndex = '100'; }
        };

        window.toggleReactMenu = function(key) {
            const menu = document.getElementById('react-' + key);
            const bubble = document.getElementById('msg-' + key);
            const isShowing = menu.classList.contains('show');
            document.querySelectorAll('.msg-menu.show').forEach(m => m.classList.remove('show'));
            document.querySelectorAll('.reaction-menu.show').forEach(m => m.classList.remove('show'));
            document.querySelectorAll('.msg-bubble').forEach(b => b.style.zIndex = '1');
            if (!isShowing) { menu.classList.add('show'); if(bubble) bubble.style.zIndex = '100'; }
        }

        window.addReaction = function(msgKey, emoji) {
            update(ref(db, `${currentMessagesRefPath}/${msgKey}/reactions`), { [myUserId]: emoji });
            document.querySelectorAll('.reaction-menu.show').forEach(m => m.classList.remove('show'));
        };

        function updateReactionsUI(msgKey, reactionsObj) {
            const displayEl = document.getElementById('reactions-display-' + msgKey);
            if (!displayEl) return;
            if (!reactionsObj) { displayEl.classList.add('hidden'); return; }
            const emojiCounts = {};
            Object.values(reactionsObj).forEach(emoji => { emojiCounts[emoji] = (emojiCounts[emoji] || 0) + 1; });
            let html = ''; Object.keys(emojiCounts).forEach(emoji => { html += `<span>${emoji}</span>`; });
            const total = Object.keys(reactionsObj).length;
            if (total > 1) html += `<span style="font-size:10px; margin-right:3px; opacity:0.8;">${total}</span>`;
            displayEl.innerHTML = html; displayEl.classList.remove('hidden');
        }

        window.deleteMsg = function(msgKey) { if(confirm("حذف الرسالة لدى الجميع؟")) remove(ref(db, `${currentMessagesRefPath}/${msgKey}`)); };

        window.prepareReply = function(name, textExcerpt) {
            replyingToMsg = { name: name, text: textExcerpt };
            document.getElementById('reply-preview-box').style.display = 'block';
            document.getElementById('reply-preview-name').innerText = name;
            document.getElementById('reply-preview-text').innerText = textExcerpt;
            msgInput.focus();
        };
        window.cancelReply = function() { replyingToMsg = null; document.getElementById('reply-preview-box').style.display = 'none'; };

        msgInput.addEventListener('input', function() {
            this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px';
            if(!currentMessagesRefPath) return;
            const roomID = currentChatMode === 'global' ? 'global' : (myUserId < currentChatTargetId ? `${myUserId}_${currentChatTargetId}` : `${currentChatTargetId}_${myUserId}`);
            set(ref(db, `typing/${roomID}/${myUserId}`), { name: myName, isTyping: true });
            clearTimeout(window.typingTimeout);
            window.typingTimeout = setTimeout(() => set(ref(db, `typing/${roomID}/${myUserId}`), { name: myName, isTyping: false }), 1500);
        });

        function sendMessage(dataObj) {
            if(!currentMessagesRefPath) return;
            dataObj.name = myName; dataObj.timestamp = Date.now();
            if(replyingToMsg) dataObj.replyTo = replyingToMsg;
            push(ref(db, currentMessagesRefPath), dataObj);
            const roomID = currentChatMode === 'global' ? 'global' : (myUserId < currentChatTargetId ? `${myUserId}_${currentChatTargetId}` : `${currentChatTargetId}_${myUserId}`);
            set(ref(db, `typing/${roomID}/${myUserId}`), { name: myName, isTyping: false });
            window.cancelReply(); msgInput.style.height = 'auto';
        }

        function sendText() {
            const text = msgInput.value.trim();
            if(!text) return; sendMessage({ type: 'text', content: text });
            msgInput.value = ''; msgInput.focus();
        }
        document.getElementById('send-btn').addEventListener('click', sendText);
        msgInput.addEventListener('keypress', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); } });

        // ================= المرفقات والصوتيات =================
        const fileInput = document.getElementById('file-input');
        document.getElementById('attach-btn').addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0]; if (!file) return;
            if (file.size > 3 * 1024 * 1024) return alert("الحد الأقصى 3 ميجابايت.");
            const reader = new FileReader(); reader.onload = e => sendMessage({ type: 'file', fileName: file.name, content: e.target.result });
            reader.readAsDataURL(file); fileInput.value = '';
        });

        navigator.serviceWorker.addEventListener('message', event => {
            if (event.data.type === 'FILE_SHARED_FROM_OS' && event.data.file) {
                const file = event.data.file;
                if (file.size > 3 * 1024 * 1024) return alert("الحد الأقصى للملفات المشتركة 3 ميجابايت.");
                if (!currentMessagesRefPath) return alert("الرجاء فتح محادثة أولاً لمشاركة الملف!");
                const reader = new FileReader(); 
                reader.onload = e => { sendMessage({ type: 'file', fileName: file.name, content: e.target.result }); alert(`تم إرسال الملف (${file.name}) بنجاح!`); };
                reader.readAsDataURL(file);
            }
        });

        window.toggleAudio = function(id) {
            const audio = document.getElementById(id), icon = document.getElementById('icon-' + id);
            if (audio.paused) { document.querySelectorAll('audio').forEach(a => { if (a.id !== id && a.id !== 'notification-sound' && !a.paused) { a.pause(); document.getElementById('icon-' + a.id).className = 'fa-solid fa-play'; } }); audio.play(); icon.className = 'fa-solid fa-pause'; } 
            else { audio.pause(); icon.className = 'fa-solid fa-play'; }
        };
        window.updateAudioProgress = function(id) {
            const audio = document.getElementById(id), progress = document.getElementById('progress-' + id), timeEl = document.getElementById('time-' + id);
            if(audio.duration) { progress.style.width = ((audio.currentTime / audio.duration) * 100) + '%'; timeEl.innerText = `${String(Math.floor(audio.currentTime / 60)).padStart(2, '0')}:${String(Math.floor(audio.currentTime % 60)).padStart(2, '0')}`; }
        };
        window.audioEnded = function(id) { document.getElementById('icon-' + id).className = 'fa-solid fa-play'; document.getElementById('progress-' + id).style.width = '0%'; document.getElementById('time-' + id).innerText = document.getElementById('time-' + id).getAttribute('data-duration'); };

        let mediaRecorder, audioChunks = [], recordTimer, recordingSeconds = 0, lastRecordedTimeString = "00:00", activeMediaStream = null; 
        const normalUI = document.getElementById('normal-input-ui'), recordingUI = document.getElementById('recording-ui'), recordTimerEl = document.getElementById('record-timer');
        function releaseMicrophone() { if (activeMediaStream) { activeMediaStream.getTracks().forEach(track => track.stop()); activeMediaStream = null; } }
        function hideRecordingUI() { clearInterval(recordTimer); recordingUI.style.display = 'none'; normalUI.style.display = 'flex'; document.getElementById('send-btn').style.display = 'flex'; }

        document.getElementById('mic-btn').addEventListener('click', async () => {
            try {
                activeMediaStream = await navigator.mediaDevices.getUserMedia({ audio: true }); mediaRecorder = new MediaRecorder(activeMediaStream); audioChunks = [];
                mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
                normalUI.style.display = 'none'; document.getElementById('send-btn').style.display = 'none'; recordingUI.style.display = 'flex';
                recordingSeconds = 0; lastRecordedTimeString = "00:00"; recordTimerEl.innerText = "00:00";
                recordTimer = setInterval(() => { recordingSeconds++; lastRecordedTimeString = `${String(Math.floor(recordingSeconds / 60)).padStart(2, '0')}:${String(Math.floor(recordingSeconds % 60)).padStart(2, '0')}`; recordTimerEl.innerText = lastRecordedTimeString; }, 1000);
                mediaRecorder.start();
            } catch(err) { alert('الرجاء السماح بصلاحية الميكروفون!'); }
        });
        document.getElementById('cancel-record-btn').addEventListener('click', () => { if(mediaRecorder && mediaRecorder.state !== "inactive") { mediaRecorder.onstop = null; mediaRecorder.stop(); } hideRecordingUI(); releaseMicrophone(); });
        document.getElementById('send-record-btn').addEventListener('click', () => {
            if(mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' }); const reader = new FileReader();
                    reader.onloadend = () => { sendMessage({ type: 'audio', content: reader.result, durationText: lastRecordedTimeString }); releaseMicrophone(); }; reader.readAsDataURL(audioBlob);
                }; mediaRecorder.stop();
            } hideRecordingUI(); 
        });

        // ================= دالة معالجة النصوص (الروابط واليوتيوب) =================
        function processTextForLinks(text) {
            let safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;"); 
            
            let ytVideoId = null;
            const ytRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
            const ytMatch = safeText.match(ytRegex);
            if (ytMatch && ytMatch[1]) { ytVideoId = ytMatch[1]; }

            const urlRegex = /(https?:\/\/[^\s]+)/g;
            let formattedText = safeText.replace(urlRegex, function(url) {
                return `<a href="${url}" target="_blank">${url}</a>`;
            });

            formattedText = formattedText.replace(/\n/g, '<br>');

            if (ytVideoId) {
                const ytPreviewHtml = `
                    <div class="yt-preview">
                        <a href="https://www.youtube.com/watch?v=${ytVideoId}" target="_blank" title="تشغيل الفيديو">
                            <img src="https://img.youtube.com/vi/${ytVideoId}/hqdefault.jpg" alt="YouTube Preview">
                            <div class="yt-play-icon"><i class="fa-brands fa-youtube"></i></div>
                        </a>
                    </div>
                `;
                formattedText += ytPreviewHtml;
            }

            return formattedText;
        }

        // ================= رسم الرسائل =================
        function renderMsg(msgKey, msgObj, isMe) {
            const div = document.createElement('div'); div.id = 'msg-' + msgKey; div.className = `msg-bubble ${isMe ? 'msg-me' : 'msg-other'}`;
            let htmlContent = '', textExcerptForReply = ''; 
            
            let quoteHtml = '';
            if(msgObj.replyTo) {
                quoteHtml = `<div class="quoted-msg" onclick="prepareReply('${msgObj.name}', '${msgObj.content ? 'نص' : 'مرفق'}')"><strong>${msgObj.replyTo.name}</strong><div style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${msgObj.replyTo.text}</div></div>`;
            }

            let safeContentToCopy = '';

            if (msgObj.type === 'text') { 
                htmlContent = processTextForLinks(msgObj.content); 
                textExcerptForReply = msgObj.content; 
                // تجهيز النص للنسخ بأمان
                safeContentToCopy = msgObj.content.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, '\\n');
            } 
            else if (msgObj.type === 'file') {
                if (msgObj.content.startsWith('data:image/')) { htmlContent = `<img src="${msgObj.content}" class="image-preview" onclick="openLightbox(this.src)">`; textExcerptForReply = '📷 صورة'; } 
                else { htmlContent = `<a href="${msgObj.content}" download="${msgObj.fileName}" class="file-attachment"><i class="fa-solid fa-file"></i> <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${msgObj.fileName}</div></a>`; textExcerptForReply = '📁 ملف'; }
            } else if (msgObj.type === 'audio') {
                const audioId = 'audio-' + msgKey; const durationText = msgObj.durationText || '00:00';
                htmlContent = `<div class="custom-audio-player"><button class="play-btn" onclick="toggleAudio('${audioId}')"><i class="fa-solid fa-play" id="icon-${audioId}"></i></button><div class="audio-progress"><div class="progress-bar" id="progress-${audioId}"></div></div><div class="audio-time" id="time-${audioId}" data-duration="${durationText}">${durationText}</div><audio id="${audioId}" src="${msgObj.content}" style="display:none;" ontimeupdate="updateAudioProgress('${audioId}')" onended="audioEnded('${audioId}')"></audio></div>`;
                textExcerptForReply = '🎤 صوت';
            }

            let actionsHtml = `
                <div class="msg-options" onclick="toggleMsgMenu('${msgKey}'); event.stopPropagation();"><i class="fa-solid fa-ellipsis-vertical"></i>
                    <div class="msg-menu" id="menu-${msgKey}">
                        <button onclick="prepareReply('${msgObj.name}', '${textExcerptForReply}'); event.stopPropagation(); toggleMsgMenu('${msgKey}')"><i class="fa-solid fa-reply"></i> رد</button>
                        ${msgObj.type === 'text' ? `<button onclick="copyMsgText('${safeContentToCopy}'); event.stopPropagation(); toggleMsgMenu('${msgKey}')"><i class="fa-solid fa-copy"></i> نسخ</button>` : ''}
                        ${isMe ? `<button class="delete-btn" onclick="deleteMsg('${msgKey}'); event.stopPropagation(); toggleMsgMenu('${msgKey}')"><i class="fa-solid fa-trash"></i> حذف للجميع</button>` : ''}
                    </div>
                </div>`;
            
            let reactMenuHtml = `
                <div class="reaction-menu" id="react-${msgKey}">
                    <span class="reaction-emoji" onclick="addReaction('${msgKey}', '👍'); event.stopPropagation();">👍</span>
                    <span class="reaction-emoji" onclick="addReaction('${msgKey}', '❤️'); event.stopPropagation();">❤️</span>
                    <span class="reaction-emoji" onclick="addReaction('${msgKey}', '😂'); event.stopPropagation();">😂</span>
                    <span class="reaction-emoji" onclick="addReaction('${msgKey}', '😮'); event.stopPropagation();">😮</span>
                    <span class="reaction-emoji" onclick="addReaction('${msgKey}', '😢'); event.stopPropagation();">😢</span>
                    <span class="reaction-emoji" onclick="addReaction('${msgKey}', '🙏'); event.stopPropagation();">🙏</span>
                </div>`;

            let readStatusHtml = '';
            if (isMe && currentChatMode === 'private') {
                const isRead = msgObj.readBy ? true : false;
                const iconClass = isRead ? "fa-solid fa-check-double status-read" : "fa-solid fa-check-double";
                readStatusHtml = `<i id="status-${msgKey}" class="${iconClass}" style="transition: color 0.4s ease, text-shadow 0.4s ease; margin-right: 3px;"></i>`;
            }

            const timeStr = msgObj.timestamp ? new Date(msgObj.timestamp).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }) : new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

            div.innerHTML = `
                ${actionsHtml} 
                ${reactMenuHtml}
                ${!isMe ? `<span class="sender-name">${msgObj.name}</span>` : ''} 
                ${quoteHtml} 
                <div>${htmlContent}</div> 
                <div class="msg-meta">${timeStr} ${readStatusHtml}</div>
                <div class="reactions-display hidden" id="reactions-display-${msgKey}"></div>
            `;
            
            chatMessages.appendChild(div); setTimeout(() => { chatMessages.scrollTop = chatMessages.scrollHeight; }, 50);
            if (msgObj.reactions) { updateReactionsUI(msgKey, msgObj.reactions); }

            let touchStartX = 0, touchStartY = 0, pressTimer;
            const startPress = (e) => {
                if(e.target.closest('a') || e.target.closest('.yt-preview')) return; 

                if(e.touches) { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }
                pressTimer = setTimeout(() => {
                    toggleReactMenu(msgKey);
                    if (navigator.vibrate) navigator.vibrate(50);
                }, 500); 
            };
            const cancelPress = () => { clearTimeout(pressTimer); };

            div.addEventListener('touchstart', startPress, {passive: true});
            div.addEventListener('touchend', e => {
                cancelPress();
                let diffX = e.changedTouches ? e.changedTouches[0].clientX - touchStartX : 0;
                if (Math.abs(diffX) > 50) { prepareReply(msgObj.name, textExcerptForReply); }
                div.style.transform = `translateX(0)`; 
            });
            div.addEventListener('touchmove', e => {
                let diffX = e.touches[0].clientX - touchStartX;
                let diffY = e.touches[0].clientY - touchStartY;
                if (Math.abs(diffX) > 10 || Math.abs(diffY) > 10) cancelPress();
                if ((isMe && diffX < -30) || (!isMe && diffX > 30)) { div.style.transform = `translateX(${diffX}px)`; }
            }, {passive: true});

            div.addEventListener('mousedown', startPress);
            div.addEventListener('mouseup', cancelPress);
            div.addEventListener('mouseleave', cancelPress);
        }
    </script>
</body>
</html>
